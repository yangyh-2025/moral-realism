"""
Pytest配置文件

配置pytest的运行参数、测试路径、标记和覆盖率设置。
"""
[pytest]

# 测试路径
testpaths = tests

# Python文件模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步模式
asyncio_mode = auto

# 默认标记
markers =
    slow: 运行较慢的测试
    security: 安全检查测试
    performance: 性能测试
    integration: 集成测试
    unit: 单元测试
    stability: 稳定性测试

# 添加选项
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore:.*pytest.PytestUnraisableWarning.*

# 最小版本
minversion = 7.4.0

# 覆盖率配置
[coverage:run]
# 源代码目录
source = src
# 包名称
omit =
    tests/*
    */__init__.py
    */conftest.py
    */test_*.py
    */mock_*.py

# 覆盖率报告配置
[coverage:report]
# 排除文件
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\b:
    @(abc\.)?abstractmethod
