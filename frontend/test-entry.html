<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试入口</title>
  <script type="module" src="/@vite/client"></script>
</head>
<body>
  <div style="padding: 50px; text-align: center; font-family: Arial, sans-serif;">
    <h1 style="color: green; font-size: 48px;">🎉 服务器正常工作！</h1>
    <p style="font-size: 24px;">如果你看到这个页面，说明Vite服务器正常运行</p>
    <button id="testBtn" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">测试API</button>
    <div id="result" style="margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 10px; display: none;"></div>
  </div>

  <script type="module">
    document.getElementById('testBtn').addEventListener('click', async () => {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';

      try {
        const response = await fetch('/api/v1/preset-scene/list');
        const data = await response.json();
        resultDiv.innerHTML = `<p style="color: green; font-size: 20px;">✅ API连接成功！找到 ${data.length} 个预设场景</p>`;
        resultDiv.innerHTML += `<p style="margin-top: 10px;">场景列表: ${data.map(s => s.scene_name).join(', ')}</p>`;
      } catch (error) {
        resultDiv.innerHTML = `<p style="color: red; font-size: 20px;">❌ API连接失败: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
