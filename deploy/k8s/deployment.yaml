apiVersion: apps/v1
kind: Deployment
metadata:
  name: abm-simulation-app
  namespace: default
  labels:
    app: abm-simulation
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abm-simulation
  template:
    metadata:
      labels:
        app: abm-simulation
        version: v1.0.0
    spec:
      containers:
      - name: backend
        image: abm-simulation:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: abm-secrets
              key: database-url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: abm-secrets
              key: api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: abm-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/docs
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/docs
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: backups-volume
          mountPath: /app/backups
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: abm-data-pvc
      - name: backups-volume
        persistentVolumeClaim:
          claimName: abm-backups-pvc
      restartPolicy: Always
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: abm-data-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: abm-backups-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
