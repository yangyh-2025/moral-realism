apiVersion: v1
kind: Service
metadata:
  name: abm-simulation-service
  namespace: default
  labels:
    app: abm-simulation
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: abm-simulation
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: abm-simulation-headless
  namespace: default
  labels:
    app: abm-simulation
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8000
    protocol: TCP
  selector:
    app: abm-simulation
