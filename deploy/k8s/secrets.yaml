apiVersion: v1
kind: Secret
metadata:
  name: abm-secrets
  namespace: default
type: Opaque
stringData:
  # 数据库连接URL (使用PostgreSQL用于生产环境)
  database-url: "postgresql://user:password@postgresql:5432/abm_simulation"
  # API密钥用于认证
  api-key: "your-secret-api-key-here"
  # OpenAI API密钥
  openai-api-key: "your-openai-api-key-here"
---
# 示例: 使用kubectl命令创建secret
# kubectl create secret generic abm-secrets \
#   --from-literal=database-url="postgresql://user:password@postgresql:5432/abm_simulation" \
#   --from-literal=api-key="your-secret-api-key-here" \
#   --from-literal=openai-api-key="your-openai-api-key-here"
